# Deploy to Hostinger - EcoTrack-NG Production
name: Deploy to Production

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, iconv, mysql, zip
          coverage: none

      - name: Install PHP dependencies
        run: |
          composer install --no-ansi --no-dev --no-interaction --no-plugins --no-progress --no-scripts --optimize-autoloader

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install NPM Dependencies & Build
        run: |
          npm install --legacy-peer-deps
          npm run build
          # ⚡️ CLEANUP (Exclude heavy folders from ZIP)
          rm -rf node_modules storage/logs/*
          # 📦 ZIP the project (Excludes .git and other dev files)
          zip -r deploy.zip . -x "*.git*" "node_modules*" ".github*" "tests*"
        env:
          VITE_PUSHER_APP_KEY: ${{ secrets.VITE_PUSHER_APP_KEY }}
          VITE_PUSHER_APP_CLUSTER: ${{ secrets.VITE_PUSHER_APP_CLUSTER }}

      - name: Server Disk Check & Nuclear Cleanup
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOSTINGER_SSH_HOST }}
          username: ${{ secrets.HOSTINGER_SSH_USER }}
          password: ${{ secrets.HOSTINGER_SSH_PASS }}
          port: ${{ secrets.HOSTINGER_SSH_PORT || 65002 }}
          script: |
            echo "📊 Checking Disk & Inodes..."
            df -h | grep "/home/u157985566" || df -h
            df -i | grep "/home/u157985566" || df -i
            echo "🧹 Clearing target directory (preserving .env)..."
            mkdir -p /home/u157985566/domains/forahia.com/public_html/ecotrack
            cd /home/u157985566/domains/forahia.com/public_html/ecotrack
            find . -maxdepth 1 ! -name '.env' ! -name '.' -exec rm -rf {} +

      - name: Upload Deployment Archive
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOSTINGER_SSH_HOST }}
          username: ${{ secrets.HOSTINGER_SSH_USER }}
          password: ${{ secrets.HOSTINGER_SSH_PASS }}
          port: ${{ secrets.HOSTINGER_SSH_PORT || 65002 }}
          source: "deploy.zip"
          target: "/home/u157985566/domains/forahia.com/public_html/ecotrack"

      - name: Extract & Post-Deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOSTINGER_SSH_HOST }}
          username: ${{ secrets.HOSTINGER_SSH_USER }}
          password: ${{ secrets.HOSTINGER_SSH_PASS }}
          port: ${{ secrets.HOSTINGER_SSH_PORT || 65002 }}
          script: |
            cd /home/u157985566/domains/forahia.com/public_html/ecotrack
            unzip -o deploy.zip && rm deploy.zip
            php artisan migrate --force --seed
            php artisan optimize
