# Deploy to WhoGoHost - EcoTrack-NG Production
name: Deploy to Production

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, iconv, mysql, zip
          coverage: none

      - name: Install PHP dependencies
        run: |
          composer install --no-ansi --no-dev --no-interaction --no-plugins --no-progress --no-scripts --optimize-autoloader

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install NPM Dependencies & Build
        run: |
          npm install --legacy-peer-deps
          npm run build
          # ⚡️ AGGRESSIVE CLEANUP to solve Disk Quota Exceeded
          rm -rf node_modules
          rm -rf .git
          rm -rf .github
          rm -rf tests
          rm -rf storage/logs/*
          # Prune heavy vendor subfolders (e.g., carbon languages)
          find vendor/nesbot/carbon/src/Carbon/Lang -type f -not -name "en.php" -delete
        env:
          VITE_PUSHER_APP_KEY: ${{ secrets.VITE_PUSHER_APP_KEY }}
          VITE_PUSHER_APP_CLUSTER: ${{ secrets.VITE_PUSHER_APP_CLUSTER }}

      - name: Server Disk Check & Nuclear Cleanup
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.WHOGOHOST_SSH_HOST }}
          username: ${{ secrets.WHOGOHOST_SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.WHOGOHOST_SSH_PORT || 22 }}
          script: |
            echo "📊 Checking Disk Space..."
            df -h | grep "/home/forahiao" || df -h
            echo "🧹 Clearing old files to make room..."
            cd /home/forahiao/public_html/ecotrack.forahia.org.ng || mkdir -p /home/forahiao/public_html/ecotrack.forahia.org.ng
            rm -rf app vendor resources public/build storage/framework/views/*

      - name: Deploy to Server via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.WHOGOHOST_SSH_HOST }}
          username: ${{ secrets.WHOGOHOST_SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.WHOGOHOST_SSH_PORT || 22 }}
          source: "./*"
          target: "/home/forahiao/public_html/ecotrack.forahia.org.ng"
          rm: false 
          strip_components: 0

      - name: Execute Post-Deployment Commands
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.WHOGOHOST_SSH_HOST }}
          username: ${{ secrets.WHOGOHOST_SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.WHOGOHOST_SSH_PORT || 22 }}
          script: |
            cd /home/forahiao/public_html/ecotrack.forahia.org.ng
            php artisan migrate --force
            php artisan cache:clear
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            php artisan optimize
