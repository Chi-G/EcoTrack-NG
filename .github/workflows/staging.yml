# Deploy to WhoGoHost - EcoTrack-NG Staging & Auto-PR
name: Deploy to Staging

on:
  push:
    branches: [ staging ]

permissions:
  contents: write
  pull-requests: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, iconv, mysql, zip
          coverage: none

      - name: Install PHP dependencies
        run: |
          composer install --no-ansi --no-dev --no-interaction --no-plugins --no-progress --no-scripts --optimize-autoloader

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install NPM Dependencies & Build
        run: |
          npm install --legacy-peer-deps
          npm run build
          # ⚡️ CLEANUP (Exclude heavy folders from ZIP, but keep .git for PR Action)
          rm -rf node_modules storage/logs/*
          # 📦 ZIP the project (Excludes .git and other dev files)
          zip -r staging_deploy.zip . -x "*.git*" "node_modules*" ".github*" "tests*"
        env:
          VITE_PUSHER_APP_KEY: ${{ secrets.VITE_PUSHER_APP_KEY }}
          VITE_PUSHER_APP_CLUSTER: ${{ secrets.VITE_PUSHER_APP_CLUSTER }}

      - name: Server Disk Check & Nuclear Staging Cleanup
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.WHOGOHOST_SSH_HOST }}
          username: ${{ secrets.WHOGOHOST_SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.WHOGOHOST_SSH_PORT || 22 }}
          script: |
            echo "📊 Checking Disk & Inodes..."
            df -h | grep "/home/forahiao" || df -h
            df -i | grep "/home/forahiao" || df -i
            echo "🧹 Clearing staging directory (preserving .env)..."
            mkdir -p /home/forahiao/public_html/ecotrack_staging.forahia.org.ng
            cd /home/forahiao/public_html/ecotrack_staging.forahia.org.ng
            find . -maxdepth 1 ! -name '.env' ! -name '.' -exec rm -rf {} +

      - name: Upload Staging Archive
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.WHOGOHOST_SSH_HOST }}
          username: ${{ secrets.WHOGOHOST_SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.WHOGOHOST_SSH_PORT || 22 }}
          source: "staging_deploy.zip"
          target: "/home/forahiao/public_html/ecotrack_staging.forahia.org.ng"

      - name: Extract & Post-Deploy (Staging)
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.WHOGOHOST_SSH_HOST }}
          username: ${{ secrets.WHOGOHOST_SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.WHOGOHOST_SSH_PORT || 22 }}
          script: |
            cd /home/forahiao/public_html/ecotrack_staging.forahia.org.ng
            unzip -o staging_deploy.zip && rm staging_deploy.zip
            php artisan migrate --force --seed
            php artisan optimize

      - name: Create Pull Request to Main
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "🔍 Checking for existing PR..."
          PR_EXISTS=$(gh pr list --base main --head staging --json number --jq '.[0].number')
          
          if [ -z "$PR_EXISTS" ]; then
            echo "🚀 Creating new PR..."
            gh pr create --title "🚀 [Auto-PR] New updates from Staging" \
                         --body "Automated PR from Staging to Main. Code has been deployed to staging and is ready for production merge." \
                         --base main \
                         --head staging
          else
            echo "✅ PR #$PR_EXISTS already exists. No new PR needed."
          fi
